<!-- 行程分頁內容 -->
<div v-if="currentTab === 'schedule'" class="pb-20">
    
    <!-- 日期循環 -->
    <div v-for="date in dateRange" :key="date" :id="'date-' + date.replace('/', '-')" class="mb-8">
        
        <!-- 2. 吸頂式日期標題 -->
        <div class="sticky top-[56px] z-10 py-2 px-4 shadow-sm backdrop-blur-md flex justify-between items-center"
             :class="getDateTheme(date).lightBg + ' ' + getDateTheme(date).text">
            <h3 class="font-bold flex items-center gap-2">
                <i data-lucide="calendar-days" class="w-4 h-4"></i>
                {{ date }}
            </h3>
            <span class="text-xs font-medium opacity-70">Day {{ dateRange.indexOf(date) + 1 }}</span>
        </div>

        <!-- 1. 時間軸容器 -->
        <div class="px-6 mt-4 relative">
            <!-- 垂直線 -->
            <div class="absolute left-[31px] top-0 bottom-0 w-0.5 bg-gray-100"></div>

            <!-- 當日行程循環 -->
            <div v-if="getScheduleByDate(date).length > 0">
                <div v-for="(item, idx) in getScheduleByDate(date)" :key="item.id" class="relative mb-6 pl-10">
                    
                    <!-- 時間軸圓點 -->
                    <div class="absolute left-[-13px] top-1.5 w-3 h-3 rounded-full border-2 border-white shadow-sm z-10"
                         :class="getDateTheme(date).bg"></div>

                    <!-- 3. 行程卡片 (帶有梅花間竹的陰影顏色) -->
                    <div class="bg-white p-4 rounded-xl border border-gray-100 transition-all active:scale-[0.98]"
                         :class="getDateTheme(date).shadow">
                        
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-sm font-bold text-gray-400 font-mono">{{ item.time }}</span>
                            <div :class="getCatStyle(item.category) + ' text-white text-[10px] px-2 py-0.5 rounded-full'">
                                {{ item.category }}
                            </div>
                        </div>

                        <h4 class="font-bold text-gray-800 mb-1">{{ item.title }}</h4>
                        
                        <div v-if="item.address" @click="jumpToMap(item.address)" class="flex items-center gap-1 text-xs text-blue-500 mb-2 italic">
                            <i data-lucide="map-pin" class="w-3 h-3"></i>
                            {{ item.address }}
                        </div>

                        <p v-if="item.desc" class="text-xs text-gray-500 bg-gray-50 p-2 rounded mb-2 leading-relaxed">
                            {{ item.desc }}
                        </p>

                        <!-- 預算標籤 (保持簡約) -->
                        <div class="flex flex-wrap gap-2">
                            <span v-if="item.estShared" class="text-[10px] bg-gray-100 text-gray-600 px-2 py-0.5 rounded italic">
                                共: ¥{{ item.estShared }}
                            </span>
                            <span v-if="item.estPersonal" class="text-[10px] bg-gray-100 text-gray-600 px-2 py-0.5 rounded italic">
                                自: ¥{{ item.estPersonal }}
                            </span>
                        </div>

                        <!-- 編輯/刪除按鈕 -->
                        <div class="flex justify-end gap-3 mt-3 pt-2 border-t border-dashed border-gray-100">
                            <button @click="editScheduleItem(item, date)" class="text-gray-400 hover:text-blue-500">
                                <i data-lucide="pencil" class="w-4 h-4"></i>
                            </button>
                            <button @click="deleteScheduleItem(date, idx)" class="text-gray-400 hover:text-red-400">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 當日無行程提示 -->
            <div v-else class="pl-10 py-4 text-sm text-gray-300 italic">
                暫無行程紀錄
            </div>
        </div>
    </div>
</div>
